name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore InlayHtmlTemplate.sln

      - name: Build
        run: dotnet build InlayHtmlTemplate.sln -c Release --no-restore

      - name: Test
        run: dotnet test InlayHtmlTemplate.sln -c Release --no-build

  mutation-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Run Stryker
        working-directory: tests/InlayHtmlTemplate.Tests
        run: dotnet stryker

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: tests/InlayHtmlTemplate.Tests/StrykerOutput/**/reports/
